services:
  blue:
    build: ..
    container_name: app-blue
    restart: unless-stopped
    environment:
      - APP_PORT=8080
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/Health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - bluegreen

  green:
    build: ..
    container_name: app-green
    restart: unless-stopped
    environment:
      - APP_PORT=8080
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/Health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - bluegreen

  nginx:
    image: nginx:alpine
    container_name: bluegreen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      blue:
        condition: service_healthy
      green:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - bluegreen

networks:
  bluegreen:
    driver: bridge

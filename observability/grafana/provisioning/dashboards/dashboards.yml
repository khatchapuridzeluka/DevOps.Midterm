# Grafana dashboard provisioning: loads any dashboard JSON found in the mounted folder.

apiVersion: 1

providers:
  - name: DevOps.WebAPI
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

# Minimal Alertmanager config. Alerts are grouped and sent to a webhook receiver.
# For the lab the receiver is a no-op sink; the alert is still visible in the
# Alertmanager UI (http://localhost:9093) and the Prometheus Alerts page.

route:
  receiver: default
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: default
